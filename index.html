<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightbringer — ThronesDB Deck Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1008;
      color: #e8d5a3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.5rem;
      color: #c9952a;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(201,149,42,0.4);
    }

    header p {
      margin-top: 0.5rem;
      color: #a89060;
      font-size: 0.95rem;
    }

    .card {
      background: #251a09;
      border: 1px solid #4a3510;
      border-radius: 8px;
      padding: 1.75rem 2rem;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: #a89060;
      margin-bottom: 0.5rem;
      letter-spacing: 0.03em;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      background: #120c04;
      border: 1px solid #4a3510;
      border-radius: 5px;
      padding: 0.6rem 0.85rem;
      color: #e8d5a3;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #c9952a; }
    input[type="text"]::placeholder { color: #5a4020; }

    button {
      background: #c9952a;
      color: #1a1008;
      border: none;
      border-radius: 5px;
      padding: 0.6rem 1.25rem;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #e0a930; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #5a4020; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      font-size: 0.88rem;
      min-height: 1.2em;
      color: #a89060;
    }

    #status.error { color: #d9534f; }
    #status.success { color: #5cb85c; }

    #setup-section {
      display: none;
      margin-top: 2rem;
      width: 100%;
      max-width: 680px;
    }

    .panel {
      background: #251a09;
      border: 1px solid #4a3510;
      border-radius: 8px;
      padding: 1.5rem 2rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.25rem;
    }

    .panel-title {
      font-size: 1.1rem;
      color: #c9952a;
      margin-bottom: 0.2rem;
    }

    .panel-subtitle {
      font-size: 0.82rem;
      color: #6a5030;
    }

    /* ── Setup section ── */

    .section-label {
      font-size: 0.75rem;
      font-family: sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6a5030;
      margin-bottom: 0.6rem;
    }

    /* Hand */
    .hand-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .hand-card {
      background: #120c04;
      border: 1px solid #4a3510;
      border-radius: 5px;
      padding: 0.35rem 0.6rem;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .hand-card.non-setup {
      opacity: 0.45;
    }

    .type-badge {
      font-family: sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .type-badge.Character  { background: #5a1a1a; color: #e8a0a0; }
    .type-badge.Location   { background: #1a3a1a; color: #90d090; }
    .type-badge.Attachment { background: #1a1a4a; color: #90a0e8; }
    .type-badge.Event      { background: #3a2a00; color: #c8a040; }
    .type-badge.other      { background: #2a2a2a; color: #808080; }

    .cost-pill {
      font-family: sans-serif;
      font-size: 0.75rem;
      font-weight: bold;
      color: #c9952a;
    }

    /* Setup combos */
    .setups-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .setups-list::-webkit-scrollbar { width: 5px; }
    .setups-list::-webkit-scrollbar-track { background: #120c04; }
    .setups-list::-webkit-scrollbar-thumb { background: #4a3510; border-radius: 3px; }

    .setup-combo {
      background: #120c04;
      border: 1px solid #3a2808;
      border-radius: 5px;
      padding: 0.55rem 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }

    .combo-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      flex: 1;
    }

    .combo-card-name {
      font-size: 0.82rem;
      color: #d4bb80;
    }

    .combo-card-name + .combo-card-name::before {
      content: '·';
      margin-right: 0.35rem;
      color: #5a4020;
    }

    .combo-total {
      font-family: sans-serif;
      font-size: 0.8rem;
      font-weight: bold;
      color: #c9952a;
      white-space: nowrap;
      background: #2a1c08;
      border: 1px solid #4a3510;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
    }

    .dup-pill {
      color: #5a9060 !important;
      font-style: italic;
    }

    .dup-label {
      font-size: 0.72rem;
      font-style: italic;
      color: #5a9060;
    }

    .no-setups {
      color: #6a5030;
      font-size: 0.88rem;
      font-style: italic;
    }

    /* Economy input */
    .economy-textarea {
      width: 100%;
      background: #120c04;
      border: 1px solid #4a3510;
      border-radius: 5px;
      padding: 0.5rem 0.75rem;
      color: #e8d5a3;
      font-size: 0.82rem;
      font-family: monospace;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.5rem;
    }
    .economy-textarea:focus { border-color: #c9952a; }
    .economy-textarea::placeholder { color: #5a4020; }

    /* Config controls */
    .config-controls {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .cfg-check {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.88rem;
      color: #c8b880;
      cursor: pointer;
      user-select: none;
    }

    .cfg-check input[type="checkbox"] {
      appearance: none;
      width: 15px;
      height: 15px;
      border: 1px solid #4a3510;
      border-radius: 3px;
      background: #120c04;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }

    .cfg-check input[type="checkbox"]:checked {
      background: #c9952a;
      border-color: #c9952a;
    }

    .cfg-check input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 5px;
      height: 8px;
      border: 2px solid #1a1008;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .cfg-slider-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.88rem;
      color: #c8b880;
    }

    .cfg-slider-row input[type="range"] {
      flex: 1;
      accent-color: #c9952a;
      cursor: pointer;
    }

    .cfg-slider-val {
      font-family: sans-serif;
      font-weight: bold;
      color: #c9952a;
      min-width: 1.2em;
      text-align: right;
    }

    .setup-combo.poor {
      border-left: 3px solid #d9534f;
      background: #1e0a0a;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 0.25rem;
    }

    .stat-card {
      background: #120c04;
      border: 1px solid #3a2808;
      border-radius: 5px;
      padding: 1rem 0.75rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: bold;
      color: #c9952a;
      font-family: sans-serif;
      line-height: 1;
    }

    .stat-pct {
      font-size: 0.85rem;
      color: #a89060;
      font-family: sans-serif;
      margin-top: 0.2rem;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #6a5030;
      margin-top: 0.35rem;
      font-family: sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-card.poor .stat-value { color: #d9534f; }
    .stat-card.good .stat-value { color: #5cb85c; }

    .sim-running {
      color: #a89060;
      font-size: 0.88rem;
      font-style: italic;
      padding: 1rem 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Lightbringer</h1>
    <p>ThronesDB Deck Analyzer</p>
  </header>

  <div class="card">
    <label for="deck-url">ThronesDB Deck URL</label>
    <div class="input-row">
      <input
        type="text"
        id="deck-url"
        placeholder="https://thronesdb.com/decklist/view/12345/deck-name"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="analyze-btn" onclick="analyze()">Analyze</button>
    </div>
    <div id="status"></div>
  </div>

  <div id="config-section" style="display:none; margin-top:2rem; width:100%; max-width:680px;">
    <div class="panel">
      <div class="panel-header">
        <div><div class="panel-title">Analyzer Configuration</div></div>
      </div>

      <div class="section-label">Economy Cards</div>
      <textarea
        id="economy-input"
        class="economy-textarea"
        rows="3"
        placeholder="Card names or IDs, one per line or comma-separated…"
        spellcheck="false"
      ></textarea>

      <div class="config-controls">
        <label class="cfg-check">
          <input type="checkbox" id="cfg-two-chars" checked>
          Require at least 2 characters
        </label>
        <label class="cfg-check">
          <input type="checkbox" id="cfg-four-cost">
          Require a 4+ cost character
        </label>
        <label class="cfg-check">
          <input type="checkbox" id="cfg-economy" checked>
          Require economy
        </label>
        <div class="section-label" style="margin-top:0.4rem;">Key Cards</div>
        <textarea
          id="key-cards-input"
          class="economy-textarea"
          rows="2"
          placeholder="Key card names or IDs, one per line or comma-separated…"
          spellcheck="false"
        ></textarea>
        <label class="cfg-check">
          <input type="checkbox" id="cfg-key-cards">
          Require key card
        </label>
        <div class="section-label" style="margin-top:0.4rem;">Avoidable Cards</div>
        <textarea
          id="avoidable-cards-input"
          class="economy-textarea"
          rows="2"
          placeholder="Avoidable card names or IDs, one per line or comma-separated…"
          spellcheck="false"
        ></textarea>
        <label class="cfg-check">
          <input type="checkbox" id="cfg-no-avoidable">
          Require no avoidable cards
        </label>
        <div class="cfg-slider-row">
          <span>Minimum cards in setup</span>
          <input type="range" id="cfg-min-cards" min="1" max="7" value="3">
          <span class="cfg-slider-val" id="cfg-min-cards-val">3</span>
        </div>
      </div>
    </div>
  </div>

  <div id="setup-section">
    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">Setup Simulator</div>
          <div class="panel-subtitle">Best setup across 5000 simulated hands</div>
        </div>
        <button id="sim-btn" onclick="runSimulations()">Run Simulations</button>
      </div>

      <div id="stats-display"></div>
    </div>
  </div>

  <script>
    const CARDS_API    = 'https://thronesdb.com/api/public/cards';
    const DECKLIST_API = id => `https://thronesdb.com/api/public/decklist/${id}`;

    const SETUP_TYPES = new Set(['Character', 'Location', 'Attachment']);
    const SETUP_GOLD  = 8;

    let cachedCards    = null;
    let currentSlots   = null;   // { code: qty, … } for active deck
    let currentCardMap = null;

    // ── Utilities ────────────────────────────────────────────────────────────

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    function parseDeckId(raw) {
      raw = raw.trim();
      const match = raw.match(/thronesdb\.com\/decklist\/view\/(\d+)/);
      if (match) return match[1];
      if (/^\d+$/.test(raw)) return raw;
      return null;
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status} from ${url}`);
      return res.json();
    }

    async function getAllCards() {
      if (cachedCards) return cachedCards;
      setStatus('Fetching card database…');
      const cards = await fetchJson(CARDS_API);
      cachedCards = {};
      for (const card of cards) {
        card.is_limited = typeof card.text === 'string' && card.text.includes('Limited.');
        const incomeMatch = typeof card.text === 'string' && card.text.match(/([+-]\d+)\s+Income/);
        card.income_modifier = incomeMatch ? parseInt(incomeMatch[1], 10) : null;
        cachedCards[card.code] = card;
      }
      updateEconomyFlags();
      return cachedCards;
    }

    function parseCardSet(textareaId) {
      const raw = document.getElementById(textareaId).value;
      return new Set(raw.split(/[\n,]+/).map(s => s.trim().toLowerCase()).filter(Boolean));
    }

    function getEconomySet() {
      return parseCardSet('economy-input');
    }

    function cardInSet(card, set) {
      return set.has(card.name.toLowerCase()) || set.has(card.code.toLowerCase());
    }

    function getConfig() {
      return {
        requireTwoChars:    document.getElementById('cfg-two-chars').checked,
        requireFourCost:    document.getElementById('cfg-four-cost').checked,
        requireEconomy:     document.getElementById('cfg-economy').checked,
        requireKeyCard:     document.getElementById('cfg-key-cards').checked,
        requireNoAvoidable: document.getElementById('cfg-no-avoidable').checked,
        minCards:           parseInt(document.getElementById('cfg-min-cards').value, 10),
      };
    }

    function isPoorSetup(cards) {
      const cfg = getConfig();
      if (cards.length < cfg.minCards) return true;
      if (cfg.requireTwoChars) {
        const chars = cards.filter(c => c.type_name === 'Character' && !c.isDuplicate).length;
        if (chars < 2) return true;
      }
      if (cfg.requireFourCost) {
        const hasFour = cards.some(c => c.type_name === 'Character' && !c.isDuplicate && c._cost >= 4);
        if (!hasFour) return true;
      }
      if (cfg.requireEconomy && !cards.some(c => c.is_economy)) return true;
      if (cfg.requireKeyCard) {
        const keySet = parseCardSet('key-cards-input');
        if (keySet.size > 0 && !cards.some(c => cardInSet(c, keySet))) return true;
      }
      if (cfg.requireNoAvoidable) {
        const avoidSet = parseCardSet('avoidable-cards-input');
        if (avoidSet.size > 0 && cards.some(c => cardInSet(c, avoidSet))) return true;
      }
      return false;
    }

    function updateEconomyFlags() {
      if (!cachedCards) return;
      const economySet = getEconomySet();
      for (const card of Object.values(cachedCards)) {
        card.is_economy = !!(card.is_limited || card.income_modifier > 0 || cardInSet(card, economySet));
      }
    }

    // ── Analyze ───────────────────────────────────────────────────────────────

    async function analyze() {
      const btn = document.getElementById('analyze-btn');
      const urlInput = document.getElementById('deck-url').value;
      document.getElementById('config-section').style.display = 'none';
      document.getElementById('setup-section').style.display = 'none';

      const deckId = parseDeckId(urlInput);
      if (!deckId) {
        setStatus('Please enter a valid ThronesDB deck URL or deck ID.', 'error');
        return;
      }

      btn.disabled = true;
      try {
        setStatus('Fetching decklist…');
        const [decklist, cardMap] = await Promise.all([
          fetchJson(DECKLIST_API(deckId)),
          getAllCards(),
        ]);

        currentSlots   = decklist.slots || {};
        currentCardMap = cardMap;

        runSimulations();
        setStatus(`Analyzed "${decklist.name || deckId}" — ${Object.keys(currentSlots).length} card types in deck.`, 'success');
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }

    // ── Setup Simulator ───────────────────────────────────────────────────────

    const NON_DECK_TYPES = new Set(['Agenda', 'Plot']);

    function buildDeckPool(slots, cardMap) {
      const pool = [];
      for (const [code, qty] of Object.entries(slots)) {
        const card = cardMap[code];
        if (!card || NON_DECK_TYPES.has(card.type_name)) continue;
        for (let i = 0; i < qty; i++) pool.push(card);
      }
      return pool;
    }

    function drawHand(pool, n) {
      // Fisher-Yates partial shuffle
      const arr = pool.slice();
      const draw = [];
      for (let i = 0; i < n && i < arr.length; i++) {
        const j = i + Math.floor(Math.random() * (arr.length - i));
        [arr[i], arr[j]] = [arr[j], arr[i]];
        draw.push(arr[i]);
      }
      return draw;
    }

    function cardCost(card) {
      const n = parseInt(card.cost);
      return isNaN(n) ? null : n;
    }

    function allValidSetups(hand) {
      // Only consider cards that can be set up and have a numeric cost
      const eligible = hand
        .filter(c => SETUP_TYPES.has(c.type_name) && cardCost(c) !== null)
        .map(c => ({ ...c, _cost: cardCost(c) }));

      const results = [];
      const n = eligible.length;

      for (let mask = 1; mask < (1 << n); mask++) {
        const combo = [];
        for (let i = 0; i < n; i++) {
          if (mask & (1 << i)) combo.push(eligible[i]);
        }

        // Unique cards: first copy costs full price, extra copies are duplicates (free)
        // Non-unique cards: each copy always costs its full price
        const uniqueSeen = new Set();
        let total = 0;
        const cardsWithDetails = combo.map(card => {
          if (card.is_unique && uniqueSeen.has(card.code)) {
            return { ...card, isDuplicate: true, effectiveCost: 0 };
          }
          if (card.is_unique) uniqueSeen.add(card.code);
          total += card._cost;
          return { ...card, isDuplicate: false, effectiveCost: card._cost };
        });

        const limitedCount = cardsWithDetails.filter(c => c.is_limited).length;
        if (total <= SETUP_GOLD && limitedCount <= 1) results.push({ cards: cardsWithDetails, total });
      }

      const seen = new Set();
      return results.filter(({ cards }) => {
        const key = cards.map(c => c.code).sort().join('|');
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function sortSetups(setups) {
      const keySet = parseCardSet('key-cards-input');

      const virtualGold = cards => cards.reduce((sum, c) => {
        if (c.isDuplicate) return sum;
        return sum + c.effectiveCost + (c.income_modifier > 0 ? c.income_modifier : 0);
      }, 0);

      return setups.slice().sort((a, b) => {
        // 1. non-poor first
        const poorDiff = (isPoorSetup(a.cards) ? 1 : 0) - (isPoorSetup(b.cards) ? 1 : 0);
        if (poorDiff !== 0) return poorDiff;

        // 2. more cards is better
        if (b.cards.length !== a.cards.length) return b.cards.length - a.cards.length;

        // 3. more key cards is better
        const keyDiff = b.cards.filter(c => cardInSet(c, keySet)).length
                      - a.cards.filter(c => cardInSet(c, keySet)).length;
        if (keyDiff !== 0) return keyDiff;

        // 4. higher virtual gold is better
        const vgDiff = virtualGold(b.cards) - virtualGold(a.cards);
        if (vgDiff !== 0) return vgDiff;

        // 5. has a limited card is better
        const limDiff = (b.cards.some(c => c.is_limited) ? 1 : 0)
                      - (a.cards.some(c => c.is_limited) ? 1 : 0);
        if (limDiff !== 0) return limDiff;

        // 6. fewer avoidable cards is better
        const avoidSet = parseCardSet('avoidable-cards-input');
        const avoidDiff = a.cards.filter(c => cardInSet(c, avoidSet)).length
                        - b.cards.filter(c => cardInSet(c, avoidSet)).length;
        if (avoidDiff !== 0) return avoidDiff;

        // 8. more characters (non-duplicate) is better
        const nonDupChars = cards => cards.filter(c => c.type_name === 'Character' && !c.isDuplicate);
        const charDiff = nonDupChars(b.cards).length - nonDupChars(a.cards).length;
        if (charDiff !== 0) return charDiff;

        // 9. higher total character strength is better
        const str = cards => nonDupChars(cards).reduce((s, c) => s + (c.strength || 0), 0);
        return str(b.cards) - str(a.cards);
      });
    }

    const SIM_COUNT = 5000;

    function runSimulations() {
      if (!currentSlots || !currentCardMap) return;

      const btn = document.getElementById('sim-btn');
      btn.disabled = true;
      document.getElementById('stats-display').innerHTML = '<div class="sim-running">Running simulations…</div>';

      // Defer to next frame so the browser can repaint before the heavy loop
      setTimeout(() => {
        const pool = buildDeckPool(currentSlots, currentCardMap);
        let poorCount = 0, economyCount = 0, limitedCount = 0, mulliganCount = 0, mulliganSuccessCount = 0;

        for (let i = 0; i < SIM_COUNT; i++) {
          let hand   = drawHand(pool, 7);
          let sorted = sortSetups(allValidSetups(hand));
          let best   = sorted.length > 0 ? sorted[0] : null;

          // Mulligan if best setup is poor (or no setup at all)
          if (!best || isPoorSetup(best.cards)) {
            mulliganCount++;
            hand   = drawHand(pool, 7);
            sorted = sortSetups(allValidSetups(hand));
            best   = sorted.length > 0 ? sorted[0] : null;
            if (best && !isPoorSetup(best.cards)) mulliganSuccessCount++;
          }

          if (!best || isPoorSetup(best.cards)) { poorCount++; continue; }

          if (best.cards.some(c => c.is_economy)) economyCount++;
          if (best.cards.some(c => c.is_limited)) limitedCount++;
        }

        renderStats(poorCount, economyCount, limitedCount, mulliganCount, mulliganSuccessCount);
        btn.disabled = false;

        document.getElementById('config-section').style.display = 'block';
        document.getElementById('setup-section').style.display = 'block';
      }, 0);
    }

    function renderStats(poorCount, economyCount, limitedCount, mulliganCount, mulliganSuccessCount) {
      const pct = v => `${Math.round(v / SIM_COUNT * 100)}%`;
      const mulliganPct = mulliganCount > 0 ? `${Math.round(mulliganSuccessCount / mulliganCount * 100)}% of mulligans` : 'n/a';
      document.getElementById('stats-display').innerHTML = `
        <div class="stats-grid">
          <div class="stat-card poor">
            <div class="stat-value">${poorCount}</div>
            <div class="stat-pct">${pct(poorCount)} of ${SIM_COUNT}</div>
            <div class="stat-label">Poor Setups</div>
          </div>
          <div class="stat-card good">
            <div class="stat-value">${economyCount}</div>
            <div class="stat-pct">${pct(economyCount)} of ${SIM_COUNT}</div>
            <div class="stat-label">With Economy</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${limitedCount}</div>
            <div class="stat-pct">${pct(limitedCount)} of ${SIM_COUNT}</div>
            <div class="stat-label">With Limited Card</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${mulliganCount}</div>
            <div class="stat-pct">${pct(mulliganCount)} of ${SIM_COUNT}</div>
            <div class="stat-label">Mulligans Taken</div>
          </div>
          <div class="stat-card good">
            <div class="stat-value">${mulliganSuccessCount}</div>
            <div class="stat-pct">${mulliganPct}</div>
            <div class="stat-label">Successful Mulligans</div>
          </div>
        </div>`;
    }

    document.getElementById('deck-url').addEventListener('keydown', e => {
      if (e.key === 'Enter') analyze();
    });

    function rerender() {
      if (!currentSlots) return;
      runSimulations();
    }

    document.getElementById('economy-input').addEventListener('input', () => {
      updateEconomyFlags();
      rerender();
    });

    ['cfg-two-chars', 'cfg-four-cost', 'cfg-economy'].forEach(id => {
      document.getElementById(id).addEventListener('change', rerender);
    });

    document.getElementById('cfg-key-cards').addEventListener('change', rerender);

    document.getElementById('cfg-no-avoidable').addEventListener('change', rerender);

    document.getElementById('key-cards-input').addEventListener('input', rerender);
    document.getElementById('avoidable-cards-input').addEventListener('input', rerender);

    document.getElementById('cfg-min-cards').addEventListener('input', function () {
      document.getElementById('cfg-min-cards-val').textContent = this.value;
      rerender();
    });
  </script>

</body>
</html>
